services:
  # -------------------------------
  # 1. API 
  # -------------------------------
  learningapi:
    image: ${DOCKER_REGISTRY-}learningapi
    build:
      context: .
      dockerfile: LearningAPI/Dockerfile
    ports:
      - "5077:8080" 
    depends_on:
      db:
        condition: service_started
      migrations:
        condition: service_started
      redis:
        condition: service_started
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=LearningLanguages;User Id=sa;Password=MySuperStrong!Pass123;TrustServerCertificate=True
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Key=4d9b4ec83f469d8b02e1cdb17745350b15cb532c5441be4ea1ca5d4f54881678
      - ASPNETCORE_URLS=http://+:8080
    develop:
      watch:
        - action: rebuild
          path: ./LearningAPI
        - action: sync
          path: ./LearningAPI/wwwroot
          target: /app/wwwroot
    volumes:
      - ./keys:/root/.aspnet/DataProtection-Keys

  # -------------------------------
  # 1b. Web (Blazor)
  # -------------------------------
  learningtrainerweb:
    image: ${DOCKER_REGISTRY-}learningtrainerweb
    build:
      context: .
      dockerfile: LearningTrainerWeb/Dockerfile
    ports:
      - "8081:8080"
    depends_on:
      - learningapi
      - ai-service
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ApiBaseUrl=http://learningapi:8080
      - AiService__BaseUrl=http://ai-service:5200

  # -------------------------------
  # 2. Migrations (runs once)
  # -------------------------------
  migrations:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /src
    volumes:
      - .:/src
    depends_on:
      db:
        condition: service_started
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=LearningLanguages;User Id=sa;Password=MySuperStrong!Pass123;TrustServerCertificate=True;Max Pool Size=2000;Min Pool Size=100;
    command: >
      bash -c "
        dotnet tool install --global dotnet-ef --version 8.0.0 || true &&
        export PATH=\"$$PATH:/root/.dotnet/tools\" &&
        dotnet ef database update --project LearningTrainerShared --startup-project LearningAPI --context ApiDbContext
      "

  # -------------------------------
  # 3. Data Base
  # -------------------------------
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: learning_sql_server
    user: root
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=MySuperStrong!Pass123 
    ports:
      - "14333:1433" 
    volumes:
      - sql_data:/var/opt/mssql/data

  # -------------------------------
  # 4. Redis Cache
  # -------------------------------
  redis:
    image: redis:alpine
    container_name: learning_redis
    ports:
      - "6379:6379"

  # -------------------------------
  # 5. Ollama (LLM Runtime) — DISABLED: using SSH tunnel to local GPU
  # To re-enable: uncomment ollama + ollama-init, change ai-service
  #   Ollama__BaseUrl back to http://ollama:11434
  # -------------------------------
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: learning_ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

  # -------------------------------
  # 5b. Ollama Init (pull model once) — DISABLED
  # -------------------------------
  # ollama-init:
  #   image: ollama/ollama:latest
  #   depends_on:
  #     ollama:
  #       condition: service_started  
  #   environment:
  #     - OLLAMA_HOST=http://ollama:11434
  #   entrypoint: ["sh", "-c", "ollama pull qwen2.5:7b"]
  #   restart: "no"

  # -------------------------------
  # 6. AI Service (Ingat.AI → Ollama via SSH tunnel on host)
  # -------------------------------
  ai-service:
    image: ${DOCKER_REGISTRY-}ingat-ai
    build:
      context: .
      dockerfile: Ingat.AI/Dockerfile
    ports:
      - "5200:5200"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5200
      - Ollama__BaseUrl=http://host.docker.internal:11434
      - Ollama__Model=qwen2.5:7b
      - Ollama__TimeoutSeconds=180

  # -------------------------------
  # 6. Caddy (Reverse Proxy)
  # -------------------------------
  caddy:
    image: caddy:latest
    container_name: learning_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - MY_DOMAIN=${MY_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  sql_data:
  # ollama_data:  # DISABLED: Ollama runs on local GPU via SSH tunnel
  caddy_data:
  caddy_config:
